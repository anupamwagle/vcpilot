<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstraTrade · Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231d4ed8' stroke-width='2.5'><path d='M3 17c1.5-1 2.5-3 4-3s2.5 1.5 4 1.5 2-2 3.5-2 1.5.5 2.5.5L21 9M21 9h-4M21 9v4' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <style>
    :root { --bg:#f9fafb; --surface:#fff; --border:#e5e7eb; --text:#111827; --text-muted:#6b7280; --accent:#1d4ed8; --accent-ring:rgba(29,78,216,.15); --pos:#10b981; }
    html.dark { --bg:#030712; --surface:#111827; --border:#374151; --text:#f9fafb; --text-muted:#9ca3af; --accent:#34d399; --accent-ring:rgba(52,211,153,.15); }
    body { background:var(--bg); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,sans-serif; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:1.5rem; box-shadow:0 4px 6px -1px rgb(0 0 0/.07); }
    .login-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:.5rem; padding:.625rem .875rem; font-size:.875rem; outline:none; transition:border-color 150ms,box-shadow 150ms; }
    .login-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
    .login-btn { width:100%; background:var(--accent); color:#fff; font-weight:600; padding:.625rem 1rem; border-radius:.5rem; font-size:.875rem; border:none; cursor:pointer; transition:filter 150ms; }
    .login-btn:hover { filter:brightness(1.1); }
    label { display:block; font-size:.8125rem; font-weight:500; color:var(--text-muted); margin-bottom:.375rem; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<script>
  (function() {
    var s=localStorage.getItem('vcpilot-theme');
    var d=window.matchMedia('(prefers-color-scheme: dark)').matches;
    if(s==='dark'||(!s&&d)) document.getElementById('html-root').classList.add('dark');
  })();
</script>

<div class="w-full max-w-sm">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div style="width:3.5rem;height:3.5rem;border-radius:.875rem;display:flex;align-items:center;justify-content:center;color:#fff;margin:0 auto 1rem;background:var(--accent)">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path d="M3 17c1.5-1 2.5-3 4-3s2.5 1.5 4 1.5 2-2 3.5-2 1.5.5 2.5.5L21 9M21 9h-4M21 9v4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold" style="color:var(--text)">AstraTrade</h1>
    <p class="text-sm mt-1" style="color:var(--text-muted)">Choose a new password</p>
  </div>

  <div class="login-card">
    {% if success %}
    <div class="p-3 mb-4 text-xs font-semibold rounded-lg text-emerald-600 bg-emerald-50 dark:bg-emerald-950/20 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-900/50">
      Password reset successfully! You can now log in.
    </div>
    <div class="text-center mt-2">
      <a href="/login" class="login-btn block text-center">Go to Sign In</a>
    </div>
    {% else %}

      {% if error %}
      <div class="p-3 mb-4 text-xs font-semibold rounded-lg text-red-600 bg-red-50 dark:bg-red-950/20 dark:text-red-400 border border-red-200 dark:border-red-900/50">
        {{ error }}
      </div>
      <div class="text-center mt-2">
        <a href="/login" class="text-xs font-medium hover:underline" style="color:var(--accent)">← Back to login</a>
      </div>
      {% else %}
      <form method="post" action="/reset-password" class="space-y-4">
        <input type="hidden" name="token" value="{{ token }}" />
        
        <div>
          <label for="password">New Password</label>
          <input type="password" id="password" name="password" autofocus required minlength="6"
                 class="login-input" placeholder="••••••••"/>
        </div>

        <button type="submit" class="login-btn mt-2">Save Password</button>
      </form>
      {% endif %}

    {% endif %}
  </div>
</div>

</body>
</html>
