<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VCPilot · {{ error_title or 'Error' }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%231d4ed8' stroke-width='2.5'><path d='M3 17c1.5-1 2.5-3 4-3s2.5 1.5 4 1.5 2-2 3.5-2 1.5.5 2.5.5L21 9M21 9h-4M21 9v4' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <style>
    :root { --bg:#f9fafb; --surface:#fff; --border:#e5e7eb; --text:#111827; --text-muted:#6b7280; --accent:#1d4ed8; --accent-ring:rgba(29,78,216,.15); --neg:#ef4444; }
    html.dark { --bg:#030712; --surface:#111827; --border:#374151; --text:#f9fafb; --text-muted:#9ca3af; --accent:#34d399; --accent-ring:rgba(52,211,153,.15); --neg:#f87171; }
    body { background:var(--bg); color:var(--text); font-family:Inter,ui-sans-serif,system-ui,sans-serif; }
    .error-card { background:var(--surface); border:1px solid var(--border); border-radius:1rem; padding:2rem; box-shadow:0 4px 6px -1px rgb(0 0 0/.07); }
    .home-btn { display:inline-block; background:var(--accent); color:#fff; font-weight:600; padding:.625rem 1.25rem; border-radius:.5rem; font-size:.875rem; border:none; cursor:pointer; transition:filter 150ms; }
    .home-btn:hover { filter:brightness(1.1); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

<script>
  (function() {
    var s=localStorage.getItem('vcpilot-theme');
    var d=window.matchMedia('(prefers-color-scheme: dark)').matches;
    if(s==='dark'||(!s&&d)) document.getElementById('html-root').classList.add('dark');
  })();
</script>

<div class="w-full max-w-md text-center">
  <!-- Symbol -->
  <div class="mb-6">
    <div style="width:4rem;height:4rem;border-radius:9999px;display:flex;align-items:center;justify-content:center;color:var(--neg);margin:0 auto 1.5rem;background:rgba(239,68,68,0.1)">
      <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    <h1 class="text-3xl font-extrabold tracking-tight" style="color:var(--text)">{{ error_code or 'Error' }}</h1>
    <h2 class="text-xl font-bold mt-2" style="color:var(--text)">{{ error_heading or 'Something went wrong' }}</h2>
  </div>

  <div class="error-card text-left mb-6">
    <p class="text-sm leading-relaxed mb-4" style="color:var(--text-muted)">
      {{ error_message or 'The application encountered an unexpected event. Please go back to the home page or try again.' }}
    </p>
    {% if error_detail %}
    <details class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-800">
      <summary class="text-xs cursor-pointer select-none font-semibold text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
        Show Technical Details
      </summary>
      <pre class="bg-gray-900 text-gray-100 p-3 rounded mt-2 font-mono text-xs overflow-x-auto select-all max-h-48 border border-gray-800">{{ error_detail }}</pre>
    </details>
    {% endif %}
  </div>

  <a href="/" class="home-btn">🏠 Back to Home</a>
</div>

</body>
</html>
