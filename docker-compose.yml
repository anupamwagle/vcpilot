# =============================================================================
# VCPilot — Docker Compose
# Services: database, redis, app, worker, beat, api, whatsapp, ibkr
# =============================================================================

x-app-env: &app-env
  env_file: .env
  environment:
    - DATABASE_URL=${DATABASE_URL}
    - REDIS_URL=${REDIS_URL}

networks:
  vcpilot-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  waha-data:

services:

  # ---------------------------------------------------------------------------
  # TimescaleDB (PostgreSQL + time-series extension)
  # ---------------------------------------------------------------------------
  database:
    image: timescale/timescaledb:latest-pg16
    container_name: vcpilot-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5439}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - vcpilot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + result backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vcpilot-redis
    restart: unless-stopped
    command: redis-server --port 6389
    ports:
      - "6389:6389"
    volumes:
      - redis-data:/data
    networks:
      - vcpilot-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6389", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # App — Database setup & migration runner
  # Runs once on boot to initialize tables, hypertables, seeds, and SaaS migrations.
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-app
    restart: "no"
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./migrations:/app/migrations
    networks:
      - vcpilot-net
    command: sh -c "python -m scripts.init_db && python -m scripts.migrate_saas"

  # ---------------------------------------------------------------------------
  # Worker — Celery Worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-worker
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app
    networks:
      - vcpilot-net
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,screening,trading,reporting
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Beat — Celery Beat Scheduler
  # Schedule file is written to /tmp (always writable by any user).
  # Using --max-interval 30 keeps the loop responsive.
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-beat
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    volumes:
      - ./app:/app/app
    networks:
      - vcpilot-net
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
      --max-interval=30

  # ---------------------------------------------------------------------------
  # API — FastAPI & Streamlit Admin/Client UI
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: vcpilot-api
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    volumes:
      - ./dashboard:/app/dashboard
      - ./app:/app/app
    networks:
      - vcpilot-net
    command: >
      sh -c "if [ \"$$APP_ENV\" = \"production\" ]; then
               uvicorn dashboard.main:app --host 0.0.0.0 --port 8501 --proxy-headers --forwarded-allow-ips='*';
             else
               uvicorn dashboard.main:app --host 0.0.0.0 --port 8501 --reload --reload-dir /app/dashboard --proxy-headers --forwarded-allow-ips='*';
             fi"

  # ---------------------------------------------------------------------------
  # WhatsApp — WAHA Core (free, single "default" session)
  # All orgs share one bot phone number. Orgs are distinguished by each org's
  # configured whatsapp_admin_number — the webhook routes incoming messages to
  # the correct org by matching the sender's phone number.
  # For fully separate sessions per org, upgrade to devlikeapro/waha-plus:latest
  # ---------------------------------------------------------------------------
  whatsapp:
    image: devlikeapro/waha:latest
    container_name: vcpilot-whatsapp
    restart: unless-stopped
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-vcpilot_2026}
      # Auto-start the default session on container boot
      WHATSAPP_START_SESSION: default
      # Webhook: all incoming messages forwarded here; VCPilot routes by sender phone
      WHATSAPP_HOOK_URL: ${WAHA_HOOK_URL:-http://api:8501/webhook/whatsapp}
      WHATSAPP_HOOK_EVENTS: message,session.status
    ports:
      - "3000:3000"
    volumes:
      - waha-data:/app/.sessions
    networks:
      - vcpilot-net

  # ---------------------------------------------------------------------------
  # IBKR — Interactive Brokers Gateway (paper by default)
  # Start this manually when ready to trade: docker compose --profile trading up ibkr
  # ---------------------------------------------------------------------------
  ibkr:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    container_name: vcpilot-ibkr
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${IBKR_PAPER_MODE:-paper}   # paper | live
      TWS_SETTINGS_PATH: /root/Jts
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: changeme
    ports:
      - "4001:4001"   # Live
      - "4002:4002"   # Paper
      - "5900:5900"   # VNC (optional debug)
    volumes:
      - ./docker/ibkr:/root/Jts
    networks:
      - vcpilot-net
    profiles:
      - trading          # Only starts with: docker compose --profile trading up
