# =============================================================================
# VCPilot — Docker Compose (Code mounted from host — restart to pick up changes)
# =============================================================================

x-app-env: &app-env
  env_file: .env
  environment:
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    #- DATABASE_URL=${DATABASE_URL}
    - REDIS_URL=${REDIS_URL}

networks:
  vcpilot-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  waha-data:
  ibkr-jts:

services:

  # ---------------------------------------------------------------------------
  # TimescaleDB (PostgreSQL + time-series extension)
  # ---------------------------------------------------------------------------
  database:
    image: timescale/timescaledb:latest-pg16
    container_name: vcpilot-database
    user: root
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # REMOVED: Local migrations mount. The initialization container handles seeds.
    networks:
      - vcpilot-net
    healthcheck:
      #test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      test: ["CMD-SHELL", "pg_isready -U vcpilot -d vcpilot -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + result backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vcpilot-redis
    restart: unless-stopped
    command: redis-server --port 6389
    ports:
      - "6389:6389"
    volumes:
      - redis-data:/data
    networks:
      - vcpilot-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6389", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # App — Database setup & migration runner
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-app
    restart: "no"
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vcpilot-net
    command: sh -c "python -m scripts.init_db && python -m scripts.migrate_saas"

  # ---------------------------------------------------------------------------
  # Worker Equities — Celery Worker
  # ---------------------------------------------------------------------------
  worker-equities:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-worker-equities
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    networks:
      - vcpilot-net
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,reporting,screening_equities,trading_equities
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Worker Crypto — Celery Worker
  # ---------------------------------------------------------------------------
  worker-crypto:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-worker-crypto
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    networks:
      - vcpilot-net
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q trading_crypto,screening_crypto
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Beat — Celery Beat Scheduler
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-beat
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    networks:
      - vcpilot-net
    command: >
      sh -c "rm -f /tmp/celerybeat.pid &&
      celery -A app.tasks.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
      --max-interval=30"

  # ---------------------------------------------------------------------------
  # API — FastAPI & Streamlit Admin/Client UI
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: vcpilot-api
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_completed_successfully
    ports:
      - "0.0.0.0:${DASHBOARD_PORT:-8501}:8501"
    networks:
      - vcpilot-net
    command: >
      sh -c "if [ \"$$APP_ENV\" = \"production\" ]; then
               uvicorn dashboard.main:app --host 0.0.0.0 --port 8501 --loop asyncio --proxy-headers --forwarded-allow-ips='*';
             else
               uvicorn dashboard.main:app --host 0.0.0.0 --port 8501 --loop asyncio --reload --reload-dir /app/dashboard --proxy-headers --forwarded-allow-ips='*';
             fi"

  # ---------------------------------------------------------------------------
  # WhatsApp — WAHA Core
  # ---------------------------------------------------------------------------
  whatsapp:
    image: devlikeapro/waha:latest
    container_name: vcpilot-whatsapp
    restart: unless-stopped
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY}
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD:-vcpilot_2026}
      WHATSAPP_START_SESSION: default
      WHATSAPP_HOOK_URL: ${WAHA_HOOK_URL:-http://api:8501/webhook/whatsapp}
      WHATSAPP_HOOK_EVENTS: message,session.status
    ports:
      - "3000:3000"
    volumes:
      - waha-data:/app/.sessions
    networks:
      - vcpilot-net

  # ---------------------------------------------------------------------------
  # IBKR — Interactive Brokers Gateway (paper by default)
  # ---------------------------------------------------------------------------
  ibkr:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    container_name: vcpilot-ibkr
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${IBKR_PAPER_MODE:-paper}
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
      READ_ONLY_API: "no"
      VNC_SERVER_PASSWORD: changeme
    ports:
      - "4001:4001"
      - "4002:4002"
      - "5900:5900"
    volumes:
      - ibkr-jts:/home/ibgateway/Jts
    networks:
      - vcpilot-net
    profiles:
      - trading

  # ---------------------------------------------------------------------------
  # noVNC — Browser-based VNC viewer for IBKR Gateway login
  # Access at http://<host>:6085/vnc.html  password: changeme
  # ---------------------------------------------------------------------------
  novnc:
    image: theasp/novnc:latest
    container_name: vcpilot-novnc
    restart: unless-stopped
    command: websockify --web /novnc 8080 ibkr:5900
    volumes:
      - /share/Container/vcpilot/novnc:/novnc:ro
    ports:
      - "6085:8080"
    networks:
      - vcpilot-net
    depends_on:
      - ibkr
    profiles:
      - trading
