# =============================================================================
# AstraTrade — Docker Compose (used for both dev and prod)
#
# App code (app/, web/, scripts/, migrations/, tests/) is bind-mounted from the
# host into every long-running service, so `git pull` on the host is reflected
# inside the containers immediately with no rebuild. Each service also
# auto-restarts its own process on code change (uvicorn --reload for the web
# app + mcp-server, watchmedo auto-restart wrapping Celery worker/beat) — so no
# `docker compose restart` is needed either. Only a dependency change
# (requirements.txt) or a Dockerfile edit requires `docker compose up --build`.
#
# Bind mounts below use a relative "." path, resolved against the directory
# this file lives in — run `docker compose` from that directory (the repo
# root) and it resolves correctly regardless of machine.
# =============================================================================

x-app-env: &app-env
  env_file: .env
  environment:
    - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    #- DATABASE_URL=${DATABASE_URL}
    - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6389/0
    #- REDIS_URL=${REDIS_URL}

x-repo-volume: &repo-volume .:/app

networks:
  vcpilot-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  ibkr-jts:

services:

  # ---------------------------------------------------------------------------
  # TimescaleDB (PostgreSQL + time-series extension)
  # ---------------------------------------------------------------------------
  database:
    image: timescale/timescaledb:latest-pg16
    container_name: vcpilot-database
    user: root
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # REMOVED: Local migrations mount. The initialization container handles seeds.
    networks:
      - vcpilot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + result backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: vcpilot-redis
    restart: unless-stopped
    command: redis-server --port 6389 --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6389:6389"
    volumes:
      - redis-data:/data
    networks:
      - vcpilot-net
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6389", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Migrate — one-shot database setup & migration runner (runs once, exits)
  # ---------------------------------------------------------------------------
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-migrate
    restart: "no"
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - *repo-volume
    networks:
      - vcpilot-net
    command: sh -c "python -m scripts.init_db && python -m scripts.migrate_saas"

  # ---------------------------------------------------------------------------
  # Worker Equities — Celery Worker
  # ---------------------------------------------------------------------------
  worker-equities:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-worker-equities
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - *repo-volume
    networks:
      - vcpilot-net
    # watchmedo restarts the celery process (not the container) whenever a .py
    # file changes under the bind-mounted /app — so `git pull` on the host is
    # picked up automatically, no `docker compose restart` needed.
    command: watchmedo auto-restart --directory=/app --pattern=*.py --recursive -- celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 -Q default,reporting,screening_equities,trading_equities
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Worker Crypto — Celery Worker
  # ---------------------------------------------------------------------------
  worker-crypto:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-worker-crypto
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - *repo-volume
    networks:
      - vcpilot-net
    command: watchmedo auto-restart --directory=/app --pattern=*.py --recursive -- celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q trading_crypto,screening_crypto
    healthcheck:
      test: ["CMD", "celery", "-A", "app.tasks.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------------------------------------------------------------------------
  # Beat — Celery Beat Scheduler
  # ---------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: vcpilot-beat
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - *repo-volume
    networks:
      - vcpilot-net
    command: >
      sh -c "rm -f /tmp/celerybeat.pid &&
      watchmedo auto-restart --directory=/app --pattern=*.py --recursive --
      celery -A app.tasks.celery_app beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
      --pidfile=/tmp/celerybeat.pid
      --max-interval=30"

  # ---------------------------------------------------------------------------
  # Web — FastAPI + Jinja2 Admin/Client UI (the whole frontend+API layer; the
  # "dashboard" is just one page within it, at GET / — see CLAUDE.md)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: vcpilot-web
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - *repo-volume
    ports:
      - "0.0.0.0:${DASHBOARD_PORT:-8501}:8501"
    networks:
      - vcpilot-net
    # --reload watches the bind-mounted code and restarts uvicorn's worker
    # process automatically on change — same command in prod and dev, so a
    # `git pull` on the host needs no `docker compose restart`.
    command: ["uvicorn", "web.main:app", "--host", "0.0.0.0", "--port", "8501", "--loop", "asyncio", "--reload", "--reload-dir", "/app", "--proxy-headers", "--forwarded-allow-ips", "*"]

  # ---------------------------------------------------------------------------
  # MCP Server — standalone MCP tool-calling surface (/mcp/sse, /mcp/messages)
  # Additive/opt-in: the web app also mounts the same MCP app in-process by
  # default, so this container is available to independently scale/restart MCP
  # traffic without touching the web app. Cutting traffic over to it requires
  # a reverse-proxy change — see app/mcp/standalone.py docstring and CLAUDE.md.
  # OAuth token issuance (/mcp/oauth/token) and the /authorize consent page stay
  # on the web app, since they need its login session.
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp
    container_name: vcpilot-mcp-server
    restart: unless-stopped
    <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - *repo-volume
    ports:
      - "0.0.0.0:${MCP_SERVER_PORT:-8502}:8502"
    networks:
      - vcpilot-net
    command: ["uvicorn", "app.mcp.standalone:app", "--host", "0.0.0.0", "--port", "8502", "--loop", "asyncio", "--reload", "--reload-dir", "/app", "--proxy-headers", "--forwarded-allow-ips", "*"]

  # ---------------------------------------------------------------------------
  # IBKR — Interactive Brokers Gateway (paper by default)
  # ---------------------------------------------------------------------------
  ibkr:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    container_name: vcpilot-ibkr
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${IBKR_PAPER_MODE:-paper}
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
      READ_ONLY_API: "no"
      BYPASS_WARNING: "yes"
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:-changeme}
      # --- Self-recovery (gnzsnz/ib-gateway IBC settings) ---
      # Gateway restart times are interpreted in this timezone.
      TIME_ZONE: ${IBKR_TIME_ZONE:-Australia/Sydney}
      # Daily restart WITHOUT requiring fresh 2FA — scheduled 8:30am AEST:
      # after the NYSE session (ends ~6-8am AEST) and before the ASX open (10am),
      # so the forced daily IB logoff never lands mid-session.
      AUTO_RESTART_TIME: ${IBKR_AUTO_RESTART_TIME:-08:30 AM}
      # If a live-account 2FA prompt times out unacknowledged, restart the login
      # loop and keep retrying instead of exiting and staying down.
      TWOFA_TIMEOUT_ACTION: restart
      RELOGIN_AFTER_TWOFA_TIMEOUT: "yes"
    ports:
      - "127.0.0.1:4001:4001"
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5900:5900"
    volumes:
      - ibkr-jts:/home/ibgateway/Jts
    networks:
      - vcpilot-net
    profiles:
      - trading

  # ---------------------------------------------------------------------------
  # noVNC — Browser-based VNC viewer for IBKR Gateway login
  # Access at http://<host>:6085/vnc.html  password: ${VNC_PASSWORD} (default: changeme)
  # ---------------------------------------------------------------------------
  novnc:
    image: theasp/novnc:latest
    container_name: vcpilot-novnc
    restart: unless-stopped
    command: websockify --web /novnc 8080 ibkr:5900
    volumes:
      - /share/Container/vcpilot/novnc:/novnc:ro
    ports:
      - "127.0.0.1:6085:8080"
    networks:
      - vcpilot-net
    depends_on:
      - ibkr
    profiles:
      - trading
